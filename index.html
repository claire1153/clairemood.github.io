<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情记录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>心情记录</h1>
            <div class="user-section">
                <span id="current-user">游客</span>
                <button id="user-btn">切换用户</button>
            </div>
        </div>
    </header>
    
    <!-- 用户登录/注册模态框 -->
    <div id="user-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>用户管理</h3>
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>
            <div class="tab-content" id="login-tab">
                <input type="text" id="login-username" placeholder="用户名">
                <input type="password" id="login-password" placeholder="密码">
                <button id="login-btn">登录</button>
            </div>
            <div class="tab-content" id="register-tab" style="display: none;">
                <input type="text" id="register-username" placeholder="用户名">
                <input type="password" id="register-password" placeholder="密码">
                <button id="register-btn">注册</button>
            </div>
        </div>
    </div>
    <main>
        <div class="container">
            <section class="mood-input">
                <h2>今天的心情</h2>
                <div class="mood-buttons">
                    <button data-mood="great">😊 很棒</button>
                    <button data-mood="good">🙂 不错</button>
                    <button data-mood="neutral">😐 一般</button>
                    <button data-mood="bad">😞 不好</button>
                    <button data-mood="terrible">😢 很糟</button>
                </div>
                <textarea id="note" placeholder="写下你的想法..."></textarea>
                <button id="save-btn">保存</button>
            </section>
            <section class="calendar">
                <h2>历史记录</h2>
                <div class="calendar-header">
                    <button id="prev-month">&lt;</button>
                    <h3 id="current-month"></h3>
                    <button id="next-month">&gt;</button>
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    <!-- 日历格子将通过JavaScript生成 -->
                </div>
            </section>
            <section class="mood-details" id="mood-details">
                <h2>详情</h2>
                <div id="details-content">
                    选择一个日期查看详情
                </div>
            </section>
        </div>
    </main>
    <footer>
        <p>© 2026 心情记录</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
